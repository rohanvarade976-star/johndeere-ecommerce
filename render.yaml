services:
  # MySQL Database (Docker with health check hack)
  - type: web
    name: jd-mysql
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./backend/Dockerfile.mysql
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: root
      - key: MYSQL_DATABASE
        value: johndeere_ecommerce

  # Backend API
  - type: web
    name: jd-backend
    env: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_HOST
        fromService:
          name: jd-mysql
          type: web
          property: host
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: root
      - key: DB_NAME
        value: johndeere_ecommerce
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://jd-frontend.onrender.com

  # Frontend (Static Site via Docker)
  - type: web
    name: jd-frontend
    env: docker
    plan: free
    dockerContext: ./frontend
    dockerfilePath: Dockerfile
    envVars:
      - key: REACT_APP_API_URL
        value: https://jd-backend.onrender.com/api
