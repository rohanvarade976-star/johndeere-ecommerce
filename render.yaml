services:
  # Backend API (Now includes MySQL)
  - type: web
    name: jd-backend
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_HOST
        value: 127.0.0.1
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: root
      - key: DB_NAME
        value: johndeere_ecommerce
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: root
      - key: DB_NAME
        value: johndeere_ecommerce
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://jd-frontend-gfpf.onrender.com # Updated with your suffix

  # Frontend (Static Site via Docker)
  - type: web
    name: jd-frontend
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: REACT_APP_API_URL
        value: https://jd-backend-f99l.onrender.com/api # Updated with your suffix
